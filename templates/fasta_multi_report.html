<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>FASTA Report</title>
		<link
			rel="stylesheet"
			href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"
		/>
		<style>
			*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

			body {
				font-family: 'Segoe UI', system-ui, sans-serif;
				background: #f4f6f9;
				color: #1e2a3a;
				min-height: 100vh;
			}

			header {
				background: linear-gradient(135deg, #1a2f4e 0%, #1e6b6b 100%);
				color: white;
				padding: 2rem 3rem;
				box-shadow: 0 2px 8px rgba(0,0,0,0.2);
			}

			header h1 {
				font-size: 1.8rem;
				font-weight: 600;
				letter-spacing: 0.5px;
			}

			header p {
				margin-top: 0.3rem;
				opacity: 0.75;
				font-size: 0.9rem;
			}

			main {
				padding: 2.5rem 3rem;
			}

			h2 {
				font-size: 1.1rem;
				font-weight: 600;
				color: #1a2f4e;
				margin-bottom: 1rem;
				padding-bottom: 0.4rem;
				border-bottom: 2px solid #1e6b6b;
				display: inline-block;
			}

			.card {
				background: white;
				border-radius: 8px;
				box-shadow: 0 1px 4px rgba(0,0,0,0.08);
				padding: 1.5rem 2rem 2rem;
				margin-bottom: 2rem;
			}

			/* DataTables overrides */
			table.dataTable thead th {
				background: #1a2f4e;
				color: white;
				font-weight: 500;
				border-bottom: none;
			}

			table.dataTable tbody tr:hover {
				background: #eef5f5 !important;
			}

			table.dataTable tbody td {
				border-color: #e8ecf0;
			}

			.dataTables_wrapper .dataTables_filter input {
				border: 1px solid #cdd4dc;
				border-radius: 4px;
				padding: 0.3rem 0.6rem;
				outline: none;
			}

			.dataTables_wrapper .dataTables_filter input:focus {
				border-color: #1e6b6b;
				box-shadow: 0 0 0 2px rgba(30,107,107,0.15);
			}

			.dataTables_wrapper .dataTables_paginate .paginate_button.current {
				background: #1e6b6b !important;
				border-color: #1e6b6b !important;
				color: white !important;
				border-radius: 4px;
			}

			.dataTables_wrapper .dataTables_paginate .paginate_button:hover {
				background: #eef5f5 !important;
				border-color: #1e6b6b !important;
				color: #1e6b6b !important;
			}
		</style>
	</head>
	<body>
		<header>
			<h1>FASTA Report</h1>
			<p>bioplot_rs</p>
		</header>

		<main>
		<div class="card">
		<h2>Samples</h2>
		<table id="fasta-table" class="display">
			<thead>
				<tr>
					<th>Sample Name</th>
					<th>Num Contigs</th>
					<th>Num Bases</th>
					<th>Mean Contig Len</th>
				</tr>
			</thead>
			<tbody>
				{% for record in records %}
				<tr>
					<td>{{ record.sample_name }}</td>
					<td>{{ record.num_contigs }}</td>
					<td>{{ record.num_bases }}</td>
					<td>{{ record.mean_contig_len() }}</td>
				</tr>
				{% endfor %}
			</tbody>
		</table>
		</div>
		</main>

		<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
		<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
		<script>
			$(document).ready(function () {
				$('#fasta-table').DataTable();
			});
		</script>
	</body>
</html>
